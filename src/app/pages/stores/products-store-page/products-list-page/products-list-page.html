<div class="bg-white rounded-lg border border-gray-300">
  @if (productsResource()){
  @for (product of productsResource(); track product.id) {
  <div class="w-full md:flex justify-between p-4 border-b border-gray-300">
    <tyn-product-detail-card [listProduct]="product"></tyn-product-detail-card>
    <div class="mt-3 md:mt-0 text-sm font-normal items-center flex justify-end">
      <a
        type="button"
        [href]="product.productUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="text-white bg-gray-700 ml-4 hover:bg-gray-900 focus:ring-4 focus:outline-none focus:ring-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center"
      >
        Ver
      </a>
      <div class="flex items-center ml-4">
        <input
          id="primary-checkbox"
          type="checkbox"
          [checked]="createCreation.isSelected(product)"
          [disabled]="
                createCreation.isFull() && !createCreation.isSelected(product)
              "
          (change)="createCreation.toggle(product)"
          class="w-6 h-6 text-primary bg-neutral-secondary-medium border-default-medium rounded-xs focus:ring-primary ring-offset-neutral-primary focus:ring-2"
        />
      </div>
    </div>
  </div>
  } @empty {
  <td colspan="7" class="text-center p-4">No hay Productos disponibles.</td>
  <!--  -->
  }

      <div class="alert alert-info text-center">
        <span class="font-bold">Cargando productos...</span>
      </div>
    </td>
  </tr>
  }  -->
}
</div>
