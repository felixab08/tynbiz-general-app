@if (listContact()) {
<a
  [ngClass]="{'bg-secondary-dark': listContact().active === true,
  'bg-white': listContact().active === false
  }"
  class="dark:bg-gray-700 dark:text-white block max-w-sm p-6 border m-2 border-gray-300 rounded-lg shadow-sm">
  <div class="flex gap-4 mb-3">
    <img class="w-10 h-10 rounded-full" [src]="listContact().image" alt="">
    <div class="font-medium">
      <div class="mb-1.5">{{listContact().fullName}}</div>
      <div class="mb-1.5 text-sm text-black">{{listContact().lastDate}}</div>
      <div class="mb-1.5 flex items-center">
        <p class="font-normal text-black"> {{listContact().timeAcces}} </p>
        <span
        [ngClass]="{
                    'bg-red-600': listContact().active === true,
                    'bg-gray-300': listContact().active === false
                  }"
        class="flex w-3 h-3 ml-2 me-3 rounded-full"></span>
      </div>
    </div>
  </div>

  <button type="button"

    class="w-full text-black font-semibold bg-white border border-gray-300 focus:outline-none hover:bg-primary hover:text-white focus:ring-4 focus:ring-gray-100 rounded-full text-sm px-5 py-2.5 dark:bg-gray-700 dark:text-white dark:border-gray-600">
    Acceder a atender
  </button>
</a>}
