@if (visible()) {
<div>
  <div class="fixed inset-0 bg-black opacity-50 z-40"></div>
  <div class="mx-4 fixed inset-0 z-50 flex items-center justify-center">
    <div class="relative w-full max-w-4xl max-h-full">
      <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700 dark:text-white">
        <!-- Header -->
        <div
          class="flex items-center justify-between md:p-2 p-1 border-b rounded-t border-gray-200"
        >
          <h3 class="text-xl font-semibold text-gray-900 dark:text-white">
            Configuración de calendario
          </h3>
          <button
            type="button"
            (click)="onClose()"
            class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center"
            data-modal-hide="default-modal"
          >
            <svg
              class="w-3 h-3"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 14 14"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
              />
            </svg>
            <span class="sr-only">Close modal</span>
          </button>
        </div>
        <div class="p-2 md:p-3 space-y-4 max-h-72 overflow-y-auto">
          <div class="mb-4">
            <ul class="tab" role="tablist">
              <li class="me-2" role="presentation">
                <button
                  (click)="selectedTab = 'horary'"
                  [ngClass]="
                  selectedTab === 'horary'
                    ? 'tab-active'
                    : 'tab-inactive'
                "
                  type="button"
                  role="tab"
                >
                  Horario
                </button>
              </li>
              <li class="me-2" role="presentation">
                <button
                  (click)="selectedTab = 'specialDates'"
                  [ngClass]="
                  selectedTab === 'specialDates'
                    ? 'tab-active'
                    : 'tab-inactive'
                "
                  type="button"
                  role="tab"
                >
                  Fechas especiales
                </button>
              </li>
              <li class="me-2" role="presentation">
                <button
                  (click)="selectedTab = 'appointmentDuration'"
                  [ngClass]="
                  selectedTab === 'appointmentDuration'
                    ? 'tab-active'
                    : 'tab-inactive'
                "
                  type="button"
                  role="tab"
                >
                  Citas
                </button>
              </li>
            </ul>
          </div>
          <div>
            <div [hidden]="selectedTab !== 'horary'">
              <tyn-horaries
                #horariesComp
                [daySchedules]="selectedCalendar()?.daySchedules"
              />
            </div>
            <div [hidden]="selectedTab !== 'specialDates'">
              <tyn-special-dates #specialDatesComp [dateOverrides]="selectedCalendar()?.dateOverrides" />
            </div>
            <div [hidden]="selectedTab !== 'appointmentDuration'">
              <tyn-services-duration-horary
                [appointmentDuration]="selectedCalendar()?.allowedSlotDurations"
              />
            </div>
          </div>
        </div>
        <div class="space-y-4 mb-5">
          <div class="relative overflow-x-auto">
            <div class="flex justify-end m-1">
              <button
                type="button"
                (click)="onClose()"
                class="py-2.5 px-5 ms-3 mr-3 text-sm font-medium text-gray-900 focus:outline-none bg-orange-400 rounded-lg border border-orange-400 hover:bg-gray-200 hover:border-orange-300 hover:text-gray-600 focus:z-10 focus:ring-4 focus:ring-gray-100"
              >
                Cancelar
              </button>
              <button type="submit" (click)="onSubmit()" class="button-primary">
                Guardar Cambios
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
}
