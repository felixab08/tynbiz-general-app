<div class="card-static dark:bg-gray-700 dark:text-white">
  <div class="mb-6">
    <h1 class="text-lg font-bold">Servicios</h1>
    <p>Defina que servicios ofrece en la sala tynbiz</p>
    <div [formGroup]="form">
      <div formArrayName="servicios">
        @for (servicio of servicios.controls; track servicio; let i = $index) {
        <div class="grid grid-cols-4 gap-2 mt-2 items-center" [formGroupName]="i">
          <input
            type="text"
            class="input-base md:col-span-2 col-span-4"
            placeholder="Ej: Asesoria express"
            formControlName="nombre"
          />
          <div class="max-w-sm sm:col-span-1 col-span-4">
            <select
              class="rounded-lg border p-2.5 pr-12 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary w-full"
              formControlName="tiempo"
            >
            @for (item of appointmentDuration; track $index) {
              <option [value]="item">{{ item }} min</option>
            }
            </select>
          </div>
          <div class="col-span-1 flex md:justify-center gap-2">
          @if (servicios.length >= 1) {
          <button
            type="button"
            class="text-white bg-gray-700 dark:bg-gray-400 dark:text-black hover:bg-gray-900 focus:ring-4 cursor-pointer focus:outline-none focus:ring-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center"
            (click)="eliminarServicio(i)"
          >
            -
          </button>
          } @if (i === servicios.length - 1) {
          <button
            type="button"
            class="text-white bg-primary hover:bg-primary-dark focus:ring-4 cursor-pointer focus:outline-none focus:ring-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center"
            (click)="agregarServicio()"
          >
            +
          </button>
          }
        </div>
        </div>
        }
      </div>
    </div>
  </div>
</div>
