<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

  @for (stores of listStores(); track stores.id) {
  <div
    class="relative mt-10 max-w-sm card-static ">
    <!-- Imagen sobresaliente -->
    <div class="sm items-center flex justify-center absolute -top-10 left-8 transform mini-card-img">
      <img class="w-12 h-12 rounded-lg" [src]="stores.logoStore" alt="">
    </div>
    <!-- Contenido -->
    <div class="pt-8 flex flex-col space-y-2 rtl:space-x-reverse">
      <p class="text-m font-bold mb-0 text-dark truncate">{{stores.nameStore}}</p>
      <a href="#" class="inline-flex font-medium items-center text-primary hover:underline">
        {{stores.sitioStore}}
      </a>
    </div>
    <div class="pt-2 flex items-center space-x-3 rtl:space-x-reverse">
      <a href="#"
        class="w-10 h-10 bg-gray-100 text-dark hover:bg-gray-300 rounded-full flex items-center justify-center">
        <i class="fa-solid fa-heart-circle-plus"></i>
      </a>
      <a href="#"
        class="w-10 h-10 bg-gray-100 text-dark hover:bg-gray-300 rounded-full flex items-center justify-center">
        <i class="fa-solid fa-thumbtack"></i>
      </a>
    </div>
  </div>
  }
</div>
