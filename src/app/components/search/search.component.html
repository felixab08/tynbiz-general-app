<div class="mt-6">
  <label
    for="default-search"
    class="mb-2 text-sm font-medium text-gray-900 sr-only dark:text-white"
    >Buscar</label
  >
  <div class="relative">
    <div
      class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none"
    ></div>
    <div class="flex">
      <input
        type="text"
        id="floating_standard"
        #txtSearch
        (keyup.enter)="valueSearch.emit(txtSearch.value)"
        (keyup)="inputValue.set(txtSearch.value)"
        [value]="inputValue()"
        class="block py-2.5 px-0 w-full mr-2 text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none dark:text-white dark:border-gray-600 dark:focus:border-primary-500 focus:outline-none focus:ring-0 focus:border-primary-600 peer"
        placeholder="Buscar... "
        autofocus="true"
      />
      <button
        type="button"
        (click)="openModal()"
        data-modal-target="default-modal"
        data-modal-toggle="default-modal"
        class="button-primary"
      >
        Busqueda avanzada
      </button>
    </div>
  </div>
  <div class="relative z-0"></div>
</div>
@if (isModalOpen()) {
  <div
    class="fixed inset-0 bg-black opacity-50 z-40"
    (click)="closeModal()"
  ></div>
}
<!-- Main modal -->
<div
  id="default-modal"
  data-modal-backdrop="static"
  tabindex="-1"
  aria-hidden="true"
  class="overflow-y-auto overflow-x-hidden fixed flex top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full"
  [ngClass]="isModalOpen() ? 'block' : 'hidden'"
>
  <div class="relative p-4 w-full max-w-lg max-h-full">
    <!-- Modal content -->
    <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
      <!-- Modal header -->
      <div
        class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200"
      >
        <div class="contain-content">
          <h3 class="text-xl font-bold text-gray-900 dark:text-white">
            Filtra tus creaciones
          </h3>
        </div>
        <button
          type="button"
          class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white"
          data-modal-hide="default-modal"
          (click)="closeModal()"
        >
          <svg
            class="w-3 h-3"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 14 14"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
            />
          </svg>
          <span class="sr-only">Close modal</span>
        </button>
      </div>
      <!-- Modal body -->
      <div class="p-4 md:p-5 space-y-4">
        <div>
          @if (listCategories()) {
            <select
              id="category"
              #category
              (change)="handlerCategory($event.target)"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
            >
              <option selected disabled>Seleccione</option>
              @for (category of listCategories(); track $index) {
                <option [value]="category.value">{{ category.label }}</option>
              }
            </select>
          }
        </div>
        <div class="mb-6">
          <div class="grid grid-cols-3 gap-4">
            <div>
              <label
                for="departaments"
                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                >Departamento *</label
              >
              @if (departamentos().length > 2) {
                <select
                  id="departaments"
                  #departament
                  (change)="handlerDepartamento($event.target)"
                  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                >
                  <option selected disabled>Seleccione</option>
                  @for (dep of departamentos(); track $index) {
                    <option [value]="dep">{{ dep }}</option>
                  }
                </select>
              }
            </div>
            <div>
              <label
                for="provincs"
                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                >Provincia *</label
              >
              @if (provincias().length > 2) {
                <select
                  id="provincs"
                  #provincia
                  (change)="handlerProvincia($event.target)"
                  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                >
                  <option selected disabled>Seleccione</option>
                  @for (prov of provincias(); track $index) {
                    <option [value]="prov">{{ prov }}</option>
                  }
                </select>
              }
            </div>
            <div>
              <label
                for="distrit"
                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                >Distrito *</label
              >
              @if (distritos().length) {
                <select
                  id="distrit"
                  #distrit
                  (change)="handlerDistrito($event.target)"
                  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                >
                  <option selected disabled>Seleccione</option>
                  @for (dist of distritos(); track $index) {
                    <option [value]="dist.ubigeoId">{{ dist.distrito }}</option>
                  }
                </select>
              }
            </div>
          </div>
        </div>
      </div>
      <!-- Modal footer -->
      <div class="flex justify-end mt-6 p-2">
        <button
          data-modal-hide="default-modal"
          type="button"
          class="py-2.5 px-5 ms-3 mr-3 text-sm font-medium text-gray-900 focus:outline-none bg-orange-400 rounded-lg border border-orange-400 hover:bg-gray-200 hover:border-orange-300 hover:text-gray-600 focus:z-10 focus:ring-4 focus:ring-gray-100"
          (click)="cleanFilter()"
        >
          Borrar filtro
        </button>
        <button
          data-modal-hide="default-modal"
          type="button"
          (click)="closeModal()"
          class="button-primary"
        >
          Aplicar filtro
        </button>
      </div>
    </div>
  </div>
</div>
