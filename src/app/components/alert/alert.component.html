<div
  class="p-4 mb-4 text-sm rounded-lg bg-green-50 animate-fadeIn fixed bottom-5 right-5 w-52 z-999"
  role="alert"
  [ngClass]="{
    'bg-green-50 text-green-800 dark:text-green-400':
      alertMenu().type === 'success',
    'bg-yellow-50 text-yellow-800 dark:text-yellow-400':
      alertMenu().type === 'warning',
    'bg-red-50 text-red-800 dark:text-red-400': alertMenu().type === 'error',
    'bg-blue-50 text-blue-800 dark:text-blue-400': alertMenu().type === 'info',
  }"
>
  <div class="grid grid-cols-6 gap-2.5">
    <i
      class="fa-2xl fa-solid col-span-1 justify-center flex content-center"
      [ngClass]="{
        'fa-circle-check': alertMenu().type === 'success',
        'fa-triangle-exclamation': alertMenu().type === 'warning',
        'fa-bomb': alertMenu().type === 'error',
        'fa-circle-info': alertMenu().type === 'info',
      }"
    ></i>
    <div class="absolute top-0 right-0 col-span-1 hover:cursor-pointer" (click)="_alertService.closeAlert()">
      <button
        type="button"
        class="text-body bg-transparent hover:bg-neutral-tertiary hover:text-heading rounded-base text-sm w-9 h-9 ms-auto inline-flex justify-center items-center"
        data-modal-hide="default-modal"
      >
        <svg
          class="w-5 h-5"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18 17.94 6M18 18 6.06 6"
          />
        </svg>
        <span class="sr-only">Close alert</span>
      </button>
    </div>
    <div class="col-span-5">
      <span class="font-bold">{{ alertMenu().title }}</span>
      <br />
      {{ alertMenu().message }}
    </div>
  </div>
</div>
