<nav class="grid">
  <div class="max-w-screen-xl mx-auto gap-2 md:gap-6 flex flex-wrap">
    @if (!user) {
      <div class="flex-wrap justify-end md:block hidden">
        <button type="button" class="button-primary me-2">
          Solicitar Tynbiz
        </button>
        <button (click)="openModal()" type="button" class="button-secondary">
          Identificate
        </button>
      </div>
      <div class="md:hidden block">
        <a class="flex items-center space-x-3 rtl:space-x-reverse">
          <img
            src="./assets/svg/ImagotipoTynbizBlanco.svg"
            class="h-8"
            alt="Tynbiz Logo"
          />
          <span
            class="self-center text-2xl font-semibold whitespace-nowrap dark:text-white"
          >
          </span>
        </a>
      </div>
    }
    @if (user) {
      <div class="flex flex-wrap gap-2 md:gap-6 justify-end">
        @if (user.role === "STORE_OWNER") {
          <div>
            <p class="text-sm text-gray-500">Atensión al cliente activa</p>
            <p class="sm:text-2xs text-xs text-gray-400">
              1 enero 2026 - 1 febrero 2026
              <i class="fa-regular fa-clock fa-xl mt-3 mx-1"></i>
            </p>
          </div>
          <button
            type="button"
            routerLink="/stores/create-calendar"
            class="button-primary cursor-pointer text-body bg-neutral-secondary-medium md:box-border md:border hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
          >
            <p class="md:block hidden font-semibold">
              Calendario <i class="fa-regular fa-calendar-days fa-xl ml-2"></i>
            </p>
            <p class="md:hidden block">
              <i class="fa-regular fa-calendar-days fa-xl"></i>
            </p>
          </button>
        }
      </div>
      <div class="flex items-center justify-end">
        <button
          type="button"
          class="flex text-sm bg-gray-800 rounded-full md:me-0 focus:ring-4 focus:ring-gray-300 dark:focus:ring-gray-600"
          id="user-menu-button"
          aria-expanded="false"
          data-dropdown-toggle="user-dropdown"
          data-dropdown-placement="bottom"
        >
          <img
            class="w-8 h-8 rounded-full"
            src="./assets/img/user.jpeg"
            alt="user photo"
          />
        </button>
        <!-- Dropdown menu -->
        @if (user) {
          <div
            class="z-50 hidden my-4 text-base list-none bg-white divide-y divide-gray-100 rounded-lg shadow-sm dark:bg-gray-700 dark:divide-gray-600 p-4"
            id="user-dropdown"
          >
            <div class="px-4 py-3">
              <span class="block text-sm text-gray-900 dark:text-white"
                >{{ user.firstName }} {{ user.lastName }}</span
              >
              <span
                class="block text-sm text-gray-500 truncate dark:text-gray-400"
                >{{ user.email }}</span
              >
            </div>
            <ul class="py-2" aria-labelledby="user-menu-button">
              <li>
                <a
                  [routerLink]="['/account']"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 dark:text-gray-200 dark:hover:text-white hover:cursor-pointer"
                  >Gestionar Cuenta</a
                >
              </li>
              <li>
                <a
                  (click)="_authService.logoutAndReload()"
                  class="cursor-pointer block px-4 py-2 text-sm text-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 dark:text-gray-200 dark:hover:text-white hover:cursor-pointer"
                  >Cerrar sesión</a
                >
              </li>
            </ul>
          </div>
        }
      </div>
    }

    <div
      class="items-center hidden w-full md:flex md:w-auto md:order-1 justify-end"
      id="navbar-user"
    ></div>
  </div>
</nav>

<app-modal [isOpen]="isLogin" (closeModal)="closeModal()">
  <app-login></app-login>
</app-modal>
